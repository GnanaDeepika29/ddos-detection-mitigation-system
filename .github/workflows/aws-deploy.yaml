name: Deploy to AWS EKS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_PREFIX: ddos-system
  HELM_CHART_PATH: deployment/helm/ddos-system
  K8S_NAMESPACE: ddos-system

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push API image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: v1.0.0-${{ github.sha }}
      run: |
        docker build -f Dockerfile.api -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_PREFIX }}/api:$IMAGE_TAG .
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_PREFIX }}/api:$IMAGE_TAG
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ddos-protection-cluster

    - name: Deploy K8s manifests
      run: |
        kubectl apply -k deployment/kubernetes/overlays/prod

    - name: Helm deploy
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        helm repo add external-secrets https://charts.external-secrets.io || true
        helm repo update
        helm upgrade --install ddos ${{ env.HELM_CHART_PATH }} \
          -n ${{ env.K8S_NAMESPACE }} --create-namespace \
          --set image.tag=${{ env.IMAGE_TAG }} \
          --set image.repository="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY_PREFIX }}/api"

    - name: Validate deployment
      run: |
        kubectl rollout status deployment/ddos-api -n ${{ env.K8S_NAMESPACE }} --timeout=300s
        kubectl rollout status deployment/ddos-detector -n ${{ env.K8S_NAMESPACE }} --timeout=300s
