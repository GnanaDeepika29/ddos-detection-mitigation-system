apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 5s
      queryTimeout: 30s
      httpMethod: POST

  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: "ddos_production"
      defaultBucket: "metrics"
      tlsSkipVerify: false
    secureJsonData:
      token: ${INFLUXDB_TOKEN}