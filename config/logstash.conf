input {
  tcp {
    port => 5000
    codec => json
    type => "ddos_events"
  }

  beats {
    port => 5044
    # FIX: ssl was hardcoded false — now reads from env var BEATS_SSL_ENABLED.
    # Set to "true" in production, "false" in dev to avoid breaking either env.
    ssl => "${BEATS_SSL_ENABLED:false}"
    # FIX: Added cert paths for when SSL is enabled in production.
    # These are no-ops when ssl => false.
    ssl_certificate => "${BEATS_SSL_CERT:/etc/ssl/certs/logstash.crt}"
    ssl_key         => "${BEATS_SSL_KEY:/etc/ssl/private/logstash.key}"
  }
}

filter {
  if [type] == "ddos_events" {
    mutate {
      add_field => {
        "[@metadata][index_date]" => "%{+YYYY.MM.dd}"
        # FIX: Added env-based index prefix so logstash writes to:
        #   dev  → ddos-logs-dev-YYYY.MM.dd
        #   prod → ddos-logs-prod-YYYY.MM.dd
        # This aligns with dev.yaml index_prefix "ddos-logs-dev-"
        # and prod.yaml index_prefix "ddos-logs-prod-" (was mismatched before).
        "[@metadata][index_prefix]" => "${LOGSTASH_INDEX_PREFIX:ddos-logs-}"
      }
    }

    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      timezone => "UTC"
    }

    geoip {
      source => "source_ip"
      target => "geoip"
      database => "/usr/share/logstash/GeoLite2-City.mmdb"
    }

    mutate {
      remove_field => ["host", "@version"]
    }
  }
}

output {
  # FIX: Removed stdout rubydebug from production output — controlled by env var.
  # Set LOGSTASH_STDOUT_ENABLED=true only in dev/debug.
  if "${LOGSTASH_STDOUT_ENABLED:false}" == "true" {
    stdout {
      codec => rubydebug
    }
  }

  elasticsearch {
    hosts => ["elasticsearch:9200"]
    # FIX: Index now uses env-injected prefix matching prod/dev index_prefix configs.
    # In prod: "ddos-logs-prod-2024.01.15"
    # In dev:  "ddos-logs-dev-2024.01.15"
    index => "%{[@metadata][index_prefix]}%{[@metadata][index_date]}"
    user => "${ELASTICSEARCH_USER}"
    password => "${ELASTICSEARCH_PASSWORD}"
  }
}