input {
  tcp {
    port => 5000
    codec => json
    type => "ddos_events"
  }
  
  beats {
    port => 5044
    ssl => false
  }
}

filter {
  if [type] == "ddos_events" {
    mutate {
      add_field => {
        "[@metadata][index_date]" => "%{+YYYY.MM.dd}"
      }
    }
    
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      timezone => "UTC"
    }
    
    geoip {
      source => "source_ip"
      target => "geoip"
      database => "/usr/share/logstash/GeoLite2-City.mmdb"
    }
    
    mutate {
      remove_field => ["host", "@version"]
    }
  }
}

output {
  stdout {
    codec => rubydebug
  }
  
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "ddos-logs-%{[@metadata][index_date]}"
    user => "${ELASTICSEARCH_USER}"
    password => "${ELASTICSEARCH_PASSWORD}"
  }
}