# ============================================
# Alertmanager Configuration
# ============================================

global:
  resolve_timeout: 5m
  slack_api_url: ${SLACK_WEBHOOK_URL}

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'webhook'

  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true

    - match:
        severity: high
      receiver: 'webhook'
      continue: true

    - match:
        severity: medium
      receiver: 'webhook'
      continue: false

    # FIX: Added low-severity route for completeness (matched with dev.yaml min_severity: low)
    - match:
        severity: low
      receiver: 'webhook'
      continue: false

receivers:
  - name: 'email-receiver'
    email_configs:
      - to: gnanadeepika2982004@gmail.com
        from: ddos-alerts@example.com
        smarthost: smtp.gmail.com:587
        auth_username: '${GMAIL_USERNAME}'
        auth_password: '${GMAIL_PASSWORD}'
        html: '{{ range .Alerts }}<h2>{{ .Annotations.summary }}</h2><p>{{ .Annotations.description }}</p>{{ end }}'
  - name: 'webhook'
    webhook_configs:
      - url: 'http://api:${API_PORT:-8080}/webhook/alert'
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials: '${API_KEY}'

  - name: 'critical-receiver'
    email_configs:
      - to: gnanadeepika2982004@gmail.com
        from: ddos-alerts@example.com
        smarthost: smtp.gmail.com:587
        auth_username: '${GMAIL_USERNAME}'
        auth_password: '${GMAIL_PASSWORD}'
        html: '{{ range .Alerts }}<h2>{{ .Annotations.summary }}</h2><p>{{ .Annotations.description }}</p>{{ end }}'
    pagerduty_configs:
      - service_key: ${PAGERDUTY_INTEGRATION_KEY}
        severity: critical
    slack_configs:
      - channel: '#ddos-critical'
        title: '🚨 DDoS Critical Alert'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    webhook_configs:
      - url: 'http://api:${API_PORT:-8080}/webhook/alert'
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials: '${API_KEY}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'high'
    equal: ['alertname']

  - source_match:
      severity: 'high'
    target_match:
      severity: 'medium'
    equal: ['alertname']

  # FIX: Added missing third inhibition tier — medium suppresses low
  - source_match:
      severity: 'medium'
    target_match:
      severity: 'low'
    equal: ['alertname']