# ML Model Drift Detection Rules
groups:
  - name: ddos-ml-drift
    rules:
      - alert: ModelDriftHigh
        expr: rate(ddos_protection_ml_drift_score[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "ML model drift detected"
          description: "Drift score {{ $value }} > 0.1 for {{ $labels.model_type }}"

      - alert: ModelPerformanceDegraded
        expr: ddos_protection_detection_confidence_avg < 0.7
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "ML detection confidence low"
          description: "Average confidence {{ $value }} < 0.7"

  - name: ddos-detection
    rules:
      - alert: HighDetectionRate
        expr: rate(ddos_protection_detection_detections_total[5m]) > 100
        for: 1m
        labels:
          severity: high
        annotations:
          summary: "High DDoS detection rate"
          description: "{{ $value }} detections/second"

  - name: ddos-mitigation
    rules:
      - alert: MitigationOverload
        expr: rate(ddos_protection_mitigation_actions_total[5m]) > 50
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Mitigation system overloaded"
          description: "{{ $value }} actions/second"

      - alert: HighPPSAttack
        expr: ddos_protection_packets_per_second > 50000
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "High PPS rate detected - potential DDoS"
          description: "PPS {{ $value }} exceeds threshold (50k)"

      - alert: LowEntropyAttack
        expr: ddos_protection_entropy_src_ip < 0.3
        for: 1m
        labels:
          severity: high
        annotations:
          summary: "Low source IP entropy - DDoS signature"
          description: "Entropy {{ $value }} indicates attack (top 5 IPs dominate)"

