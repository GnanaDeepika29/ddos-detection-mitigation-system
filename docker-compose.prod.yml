# version removed - obsolete, Docker Compose v2 auto-detects

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: ddos-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ddos-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: ddos-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - ddos-net
    volumes:
      - kafka-data:/var/lib/kafka/data

  redis:
    image: redis:7.2-alpine
    hostname: redis
    container_name: ddos-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      - ddos-net
    volumes:
      - redis-data:/data

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ddos-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/rules.prometheus.yml:/etc/prometheus/rules.prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - ddos-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.7
    container_name: ddos-grafana
    depends_on:
      - prometheus
    env_file: .env
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./config/grafana:/etc/grafana/provisioning:ro
      - ./src/monitoring/grafana_dashboard.json:/var/lib/grafana/dashboards/ddos-dashboard.json:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASS}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_EXPLORE_ENABLED: "true"
      GF_INSTALL_PLUGINS: 'grafana-clock-panel,grafana-simple-json-datasource'
    networks:
      - ddos-net
    restart: unless-stopped

  collector:
    build:
      context: .
      dockerfile: Dockerfile.collector
    container_name: ddos-collector
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_FLOWS: network_flows_prod
      COLLECTOR_MODE: synthetic
      COLLECTOR_METRICS_PORT: 9092  # Different internal port
    # No external port expose for collector metrics - internal only
    volumes:
      - /dev:/dev
    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true
    depends_on:
      - kafka
      - redis
    networks:
      - ddos-net
    restart: unless-stopped

  detector:
    build:
      context: .
      dockerfile: Dockerfile.detector
    container_name: ddos-detector
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_FLOWS: network_flows_prod
      KAFKA_TOPIC_ALERTS: ddos_alerts_prod
      METRICS_PORT: 9091
      MODEL_PATH: /app/models/production/xgboost_cic.pkl
    ports:
      - "9091:9091"
    volumes:
      - ./models/production:/app/models/production:ro
    depends_on:
      - kafka
      - redis
    networks:
      - ddos-net
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ddos-api
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_ALERTS: ddos_alerts_prod
      API_PORT: 8000
      ENVIRONMENT: production
      AUTO_MITIGATE: "true"
      CLOUD_PROVIDER: none
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    depends_on:
      - kafka
      - redis
    networks:
      - ddos-net
    restart: unless-stopped

networks:
  ddos-net:
    driver: bridge

volumes:
  grafana-storage:
  prometheus-data:
  kafka-data:
  redis-data:

