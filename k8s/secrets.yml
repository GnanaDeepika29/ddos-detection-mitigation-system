# ============================================
# Kubernetes Secrets Configuration
# ============================================

apiVersion: v1
kind: Secret
metadata:
  name: cloudshield-secrets
  namespace: ddos-system
type: Opaque
stringData:
  jwt-secret: ${API_JWT_SECRET_KEY}  # Injected by CI/CD
  api-keys: ${API_API_KEY}
  redis-password: ${REDIS_PASSWORD}
  kafka-password: ${KAFKA_PASSWORD}
  postgres-password: ${POSTGRES_PASSWORD}
---
# External Secrets Operator configuration for Vault integration
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: ddos-system
spec:
  provider:
    vault:
      server: "https://vault.internal.example.com"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudshield-vault-secrets
  namespace: ddos-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: vault-backend
  target:
    name: cloudshield-secrets
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: secret/cloudshield/jwt
        property: value
    - secretKey: redis-password
      remoteRef:
        key: secret/cloudshield/redis
        property: password
    - secretKey: kafka-password
      remoteRef:
        key: secret/cloudshield/kafka
        property: password
    - secretKey: postgres-password
      remoteRef:
        key: secret/cloudshield/postgres
        property: password
    - secretKey: api-keys
      remoteRef:
        key: secret/cloudshield/api
        property: keys
