apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ddos-collector
  namespace: ddos-system
  labels:
    app: ddos-collector
    release: prometheus
spec:
  selector:
    matchLabels:
      app: ddos-collector
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
  namespaceSelector:
    matchNames:
      - ddos-system
---
