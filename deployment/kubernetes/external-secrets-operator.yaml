---
# ExternalSecrets Operator for AWS SSM integration
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
# CustomResourceDefinitions for ExternalSecrets
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clustersecretstores.external-secrets.io
spec:
  group: external-secrets.io
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                provider:
                  type: object
                  properties:
                    aws:
                      type: object
                      properties:
                        service:
                          type: string
                        region:
                          type: string
                        role:
                          type: string
                controller:
                  type: string
      additionalPrinterColumns:
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
---
# ExternalSecrets Operator HelmRelease (uses Terraform helm provider)
# Alternative: raw YAML deploy
---
# ClusterSecretStore for AWS SSM
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-ssm-store
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      role: arn:aws:iam::ACCOUNT:role/ddos-external-secrets-role  # Create this IAM role
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
# ExternalSecret for ddos-cloud-credentials (replaces mock secret.yaml)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ddos-cloud-credentials
  namespace: ddos-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm-store
    kind: ClusterSecretStore
  target:
    name: ddos-cloud-credentials-prod
    creationPolicy: Owner
  data:
  - secretKey: AWS_ACCESS_KEY_ID
    remoteRef:
      key: /ddos/prod/aws/access-key
  - secretKey: AWS_SECRET_ACCESS_KEY
    remoteRef:
      key: /ddos/prod/aws/secret-key
  - secretKey: API_API_KEY
    remoteRef:
      key: /ddos/prod/api-key
  - secretKey: API_JWT_SECRET_KEY
    remoteRef:
      key: /ddos/prod/jwt-secret
  - secretKey: REDIS_PASSWORD
    remoteRef:
      key: /ddos/prod/redis-password
  - secretKey: POSTGRES_PASSWORD
    remoteRef:
      key: /ddos/prod/postgres-password

