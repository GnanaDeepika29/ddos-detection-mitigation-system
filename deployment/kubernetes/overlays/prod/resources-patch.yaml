# Prod resource limits + replicas
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ddos-detector
spec:
  replicas: 5
  template:
    spec:
      containers:
      - name: detector
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
          limits:
            memory: "16Gi"
            cpu: "8000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ddos-api
spec:
  replicas: 5
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-gp3
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: "true"
volumeBindingMode: WaitForFirstConsumer


