apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ddos-detector-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ddos-detector
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ddos-detector-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ddos-detector
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ddos-internal-only
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
    - namespaceSelector: {}

